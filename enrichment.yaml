# enrichment.yaml
# Configuration d'enrichissement automatique pour chaque route.
# Le script build_routes.py lit ce fichier pour savoir comment
# récupérer les arrêts et coordonnées à jour depuis les APIs.
#
# Champs possibles par route :
#   api: hafas_db | hafas_oebb | sncf | entur | manual
#   from_station: nom exact de la gare de départ (pour lookup Hafas)
#   to_station: nom exact de la gare d'arrivée
#   train_number: numéro du train pour filtrer les résultats (ex: "NJ 466")
#   seasonal:
#     active_from: "MM-DD"   # début de saison
#     active_until: "MM-DD"  # fin de saison (peut croiser le 1er janvier)
#
# Si api: manual → le script conserve les stops existants dans routes.json
# sans appel réseau. À utiliser pour les opérateurs sans API fiable.

routes:

  # ─── ÖBB NIGHTJET (via DB Hafas) ──────────────────────────────────────────

  nightjet-vienna-hamburg:
    api: hafas_db
    from_station: "Wien Hbf"
